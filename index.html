<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ALIF Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- লোডিং স্ক্রিন -->
    <div id="loading-screen">
        <div class="loader-container">
            <div class="alif-brand">💰 ALIF</div>
            <div class="spinner"></div>
            <p style="margin-top:20px; color: var(--tg-theme-hint-color);">লোড হচ্ছে...</p>
        </div>
    </div>

    <!-- মেইন অ্যাপ -->
    <div id="main-content">
        <div class="app-header">
            <h1>💰 ALIF Earn</h1>
            <p>টাস্ক করে ইনকাম করুন</p>
        </div>

        <!-- ইউজার ব্যালেন্স -->
        <div class="balance-card">
            <div class="balance-label">আপনার ব্যালেন্স</div>
            <div class="balance-amount" id="userBalance">$0.00</div>
            <button class="withdraw-btn" id="withdrawBtn">উইথড্র</button>
        </div>

        <!-- টাস্ক লিস্ট -->
        <div class="task-section">
            <h2>📋 আজকের টাস্ক</h2>
            <div id="taskList">
                <!-- JS দিয়ে ডাইনামিক লোড হবে -->
            </div>
        </div>

        <!-- রেফারেল সেকশন -->
        <div class="referral-section">
            <h2>👥 রেফার করুন</h2>
            <p>প্রতি রেফারেলের জন্য <strong>$0.50</strong></p>
            <button class="referral-btn" id="referralBtn">রেফার লিংক কপি</button>
            <div class="referral-stats">
                <span>রেফারেল: <strong id="referralCount">0</strong></span>
            </div>
        </div>

        <!-- অ্যাডমিন প্যানেল লিংক (শুধু অ্যাডমিন দেখবে) -->
        <div id="adminPanelLink" style="display:none; margin-top:20px;">
            <a href="admin.html" class="admin-link">⚙️ অ্যাডমিন প্যানেল</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
    </html>
